name: Update from Core Tmux

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
            uses: actions/checkout@v4

      - name: Download core tmux formula
        run: |
          mkdir -p base
          curl -sL -o base/tmux.rb \
            https://raw.githubusercontent.com/Homebrew/homebrew-core/master/Formula/t/tmux.rb
          
      - name: Check for changes
        id: check
        run: |
          if git diff --quiet base/tmux.rb 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes in core tmux formula"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Core tmux formula has been updated"
          fi
          
      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add base/tmux.rb
          git commit -m "Update base tmux formula from homebrew-core

          Automated update from:
          https://github.com/Homebrew/homebrew-core/tree/master/Formula/t/tmux.rb"
          git push
