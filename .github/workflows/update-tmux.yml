name: Update from Core Tmux

on:
    push:
        branches: [main]
    schedule:
        # Run weekly on Sundays at 00:00 UTC
        - cron: "0 0 * * 0"
    workflow_dispatch: # Allow manual trigger

jobs:
    update:
        runs-on: macos-latest
        steps:
            - name: Checkout tap
              uses: actions/checkout@v4

            - name: Setup Homebrew
              uses: Homebrew/actions/setup-homebrew@master

            - name: Download core tmux formula
              run: |
                  mkdir -p base
                  curl -sL -o base/tmux.rb \
                    https://raw.githubusercontent.com/Homebrew/homebrew-core/master/Formula/t/tmux.rb

            - name: Generate formula
              run: |
                  ruby scripts/generate-formula.rb

            - name: Fix style
              run: |
                  brew style --fix . || true

            - name: Check for changes
              id: check
              run: |
                  if git diff --exit-code; then
                    echo "changed=false" >> "$GITHUB_OUTPUT"
                    echo "No changes"
                  else
                    echo "changed=true" >> "$GITHUB_OUTPUT"
                    echo "Formula updated"
                  fi

            - name: Commit and push if changed
              if: steps.check.outputs.changed == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git commit -m "Update tmux-macos-net from homebrew-core

                  Automated update of base tmux formula and regeneration.
                  Source: https://github.com/Homebrew/homebrew-core/tree/master/Formula/t/tmux.rb"
                  git push
